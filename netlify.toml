[build]
  publish = "dist/public"
  command = "./build-netlify.sh"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/service*"
  to = "/.netlify/functions/service"
  status = 200

[[redirects]]
  from = "/inquiry*"
  to = "/.netlify/functions/inquiry"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  external_node_modules = ["mongoose", "@sendgrid/mail", "nodemailer"]
  node_bundler = "esbuild"